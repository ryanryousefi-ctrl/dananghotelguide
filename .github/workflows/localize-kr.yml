name: Korean Localization

on:
  workflow_dispatch:

jobs:
  localize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install cheerio node-fetch

      - name: Run localization
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node localize-kr.js --all
        - name: Run localization
  env:
    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  run: node localize-kr.js --all

- name: Commit Korean pages
  run: |
    git config --global user.name "github-actions"
    git config --global user.email "actions@github.com"
    git add kr/
    git commit -m "Add Korean translations" || echo "No changes"
    git push
