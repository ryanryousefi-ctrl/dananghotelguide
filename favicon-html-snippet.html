<!-- ✅ Paste this inside your <head> tag on every page -->

<!-- Classic favicon for Chrome/Firefox/Edge (multi-size ICO) -->
<link rel="icon" href="/favicon.ico" sizes="any">

<!-- SVG favicon (modern Chrome/Firefox prefers this over ICO) -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<!-- Apple devices -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<!-- Android / PWA manifest -->
<link rel="manifest" href="/site.webmanifest">

<!-- Theme color (Chrome address bar on mobile) -->
<meta name="theme-color" content="#1B5C5C">
